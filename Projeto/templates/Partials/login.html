<h1>Já tem conta?</h1>
<form hx-post="/login">
  <input type="text" name="username" placeholder="Username" required>
  <input type="password" name="senha" placeholder="senha" required>
    <button type="submit">Entrar</button>
</form>
<h1>Criar conta</h1>
<form hx-post="/usuario"
      hx-target="none">
 
  <input type="text" name="username" placeholder="username" required>
  <input type="password" name="senha" placeholder="senha" required>
 
  <button type="submit">Criar</button>
</form>
