<hi>nome {{ nome }}</h1>
<button hx-get="/logout"
	hx-trigger="click"
        hx-target="main">
  sair
</button>
<button hx-delete="/usuario"
	hx-trigger="click"
        hx-target="main">
  Excluir Conta
</button>
<div id="listaSeguindo"
     hx-get="/seguindo"
     hx-target="#listaSeguindo"
     hx-trigger="load"
     hx-push-url="false">
</div>
<form  hx-post="/seguir">
  <input type="text" name="seguindo_nome" placeholder="nome">
  <button type="submit">Seguir</button>
</form>
  


<div id="listaPosts"
     hx-get="/listaPost"
     hx-trigger="load"
     hx-push-url="false"
     hx-target="#listaPosts">
</div>

<form hx-post="/post"
      hx-push-url="false"
      hx-target="#listaPosts"
      hx-select="#listaPosts">
  <input type="text" name="obraNome" placeholder="nome" required>
  <select name="tipo">
    <option value="anime">anime</option>
    <option value="manga">manga</option> 
  </select>
  
  <select name="visto">
    <option value="Visto">visto</option>
    <option value="Na meta">Na meta</option>
  </select>
  
  <input type="text" name="comentarios" placeholder="Comentários">
  
  <select name="reacao">
    <option value="Neutro">neutro</option>
    <option value="Gostei">&#128077</option>
    <option value="Odiei">&#128078</option>
  </select>
  <input type="number" name="meta" placeholder="Quando?">
  <button type="submit">Registrar</button>
</form>
