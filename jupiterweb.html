<!DOCTYPE html>
<html>
    <head>
        <title>
            JupiterWeb
        </title>
        <style>
            
            body{
                display: flex;
                flex-direction: column;
                background-color: #3c3c3c;
                font-size: large;
            }
            header{
                height: 15vh;
                width: 100vw;
                display: grid;
            }
            .gifzinho{
                width: 100vw;
                height: 5vh;
            }
            .usp{
                margin: auto;
                min-width: 50vw;
                max-height: 10vh;
            }
           

            form{
                display: flex;
                flex-direction: column;
            }
            input{
                margin: auto;
                margin-bottom: 3vh;
                max-height:10vw;
                width: 50vw;
            }
            ul{
                list-style-type: none;
                margin: 0;
                padding: 0;
                display: flex;
                color: #2b2b2b;
                
                
            }
            a{
                color:white;
                text-decoration: none;
                text-align: center;
            }
            li a{
               display: block;
                
                padding: 8px 16px;
             
            }
            li a:hover {
                background-color: red;
                
                }
            
            @media(orientation: landscape){
                ul{
                    flex-direction: row;
                }
            }
            @media(orientation: portrait){
                ul{
                    flex-direction: column;
                }
            }
            
        </style>
    </head>
    <body>
        <header>
            <img class="usp" href=" https://www5.usp.br/" src="https://uspdigital.usp.br/comumwebdev/imagens/cabecalho/usp-logo-texto.png">
            <img class="gifzinho" src="https://uspdigital.usp.br/comumwebdev/imagens/cabecalho/bg-headtop.gif">

        </header>
        <ul>
           <li><a href="https://uspdigital.usp.br/jupiterweb/jupArquivosPublicos.jsp?tiparq=9&anoprg=2026&codmnu=6863">Calendario</a></li> 
            <li><a href="https://uspdigital.usp.br/jupiterweb/jupCarreira.jsp?codmnu=8275">Cursos de ingresso</a></li>
            <li><a href="https://uspdigital.usp.br/jupiterweb/jupDisciplinaBusca?tipo=D&codmnu=6755">Diciplinas</a></li>
            
        </ul>   
            <form >
                <input type="number" placeholder="NUSP">
                <input type="password" placeholder="Senha">
                <input type="submit" value="Enviar">
            </form>
            <a href="https://uspdigital.usp.br/jupiterweb/esqueciSenha#">Esqueci a Senha</a>
        
    </body>
</html>
